openapi: 3.0.3
info:
  title: Draupnir API
  description: AI 服務管理平台 API，建構於 Bifrost AI Gateway 之上
  version: 0.1.0
servers:
  - url: http://localhost:3000
    description: 本地開發伺服器

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康檢查
      responses:
        '200':
          description: 健康狀態
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/history:
    get:
      tags: [Health]
      summary: 健康檢查歷史
      responses:
        '200':
          description: 歷史紀錄

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 註冊新用戶
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: 驗證失敗或 Email 已存在

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 用戶登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認證失敗
        '422':
          description: 驗證失敗

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh Token 無效
        '422':
          description: 驗證失敗

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功

  /api/users/me:
    get:
      tags: [User]
      summary: 取得個人資料
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功取得資料
    put:
      tags: [User]
      summary: 更新個人資料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
        '422':
          description: 驗證失敗

  /api/users:
    get:
      tags: [User]
      summary: 列表所有用戶
      security:
        - bearerAuth: []
      x-test-role: admin
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/users/{id}:
    get:
      tags: [User]
      summary: 取得指定用戶
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      x-test-setup:
        - operation: post-/api/auth/register
          body: { email: "setup-user@feature.test", password: "SecurePass123" }
          extract:
            id: "$.data.id"
      responses:
        '200':
          description: 成功

  /api/users/{id}/status:
    patch:
      tags: [User]
      summary: 變更用戶狀態
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeStatusRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations:
    post:
      tags: [Organization]
      summary: 建立組織
      security:
        - bearerAuth: []
      x-test-role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
      responses:
        '201':
          description: 建立成功
        '422':
          description: 驗證失敗
    get:
      tags: [Organization]
      summary: 列表組織
      security:
        - bearerAuth: []
      x-test-role: admin
      responses:
        '200':
          description: 成功取得列表

  /api/organizations/{id}:
    get:
      tags: [Organization]
      summary: 取得指定組織
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      x-test-setup:
        - operation: post-/api/organizations
          body: { name: "Setup Org", managerUserId: "$.adminUserId" }
          extract:
            id: "$.data.id"
      responses:
        '200':
          description: 成功
    put:
      tags: [Organization]
      summary: 更新組織
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations/{id}/status:
    patch:
      tags: [Organization]
      summary: 變更組織狀態
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOrgStatusRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations/{id}/members:
    get:
      tags: [Organization]
      summary: 列表組織成員
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{id}/invitations:
    post:
      tags: [Organization]
      summary: 邀請成員
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationRequest'
      responses:
        '201':
          description: 邀請成功
        '422':
          description: 驗證失敗
    get:
      tags: [Organization]
      summary: 列表邀請
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{id}/invitations/{invId}:
    delete:
      tags: [Organization]
      summary: 取消邀請
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: invId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/invitations/{token}/accept:
    post:
      tags: [Organization]
      summary: 接受邀請
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations/{id}/members/{userId}:
    delete:
      tags: [Organization]
      summary: 移除成員
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/organizations/{id}/members/{userId}/role:
    patch:
      tags: [Organization]
      summary: 變更成員角色
      security:
        - bearerAuth: []
      x-test-role: admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Organization-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeMemberRoleRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations/{orgId}/keys:
    post:
      tags: [ApiKey]
      summary: 建立 API Key
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 建立成功
        '422':
          description: 驗證失敗
    get:
      tags: [ApiKey]
      summary: 列表 API Keys
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/keys/{keyId}/revoke:
    post:
      tags: [ApiKey]
      summary: 撤銷 API Key
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/keys/{keyId}/label:
    patch:
      tags: [ApiKey]
      summary: 更新 API Key 標籤
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKeyLabelRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/keys/{keyId}/permissions:
    put:
      tags: [ApiKey]
      summary: 設定 API Key 權限
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetKeyPermissionsRequest'
      responses:
        '200':
          description: 成功
        '422':
          description: 驗證失敗

  /api/organizations/{orgId}/app-keys:
    post:
      tags: [AppApiKey]
      summary: 配發應用層級 App API Key
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueAppApiKeyRequest'
      responses:
        '201':
          description: 建立成功
        '400':
          description: 請求錯誤
        '422':
          description: 驗證失敗
    get:
      tags: [AppApiKey]
      summary: 列表 App API Keys
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/app-keys/{keyId}/rotate:
    post:
      tags: [AppApiKey]
      summary: 輪換 App API Key
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '404':
          description: 找不到 Key

  /api/app-keys/{keyId}/revoke:
    post:
      tags: [AppApiKey]
      summary: 撤銷 App API Key
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '404':
          description: 找不到 Key

  /api/app-keys/{keyId}/scope:
    put:
      tags: [AppApiKey]
      summary: 更新 App API Key Scope 與綁定模組
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAppApiKeyScopeRequest'
      responses:
        '200':
          description: 成功
        '404':
          description: 找不到 Key

  /api/app-keys/{keyId}/usage:
    get:
      tags: [AppApiKey]
      summary: 查詢 App API Key 用量
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '404':
          description: 找不到 Key

  /api/dev-portal/apps:
    post:
      tags: [DevPortal]
      summary: 註冊 Developer Portal Application
      x-test-role: admin
      x-test-setup:
        - operation: post-/api/organizations
          body: { name: "DevPortal Setup Org", managerUserId: "$.adminUserId" }
          extract:
            orgId: "$.data.id"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orgId, name]
              properties:
                orgId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                redirectUris:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 建立成功
        '400':
          description: 請求錯誤
        '401':
          description: 未授權
        '422':
          description: 驗證失敗
    get:
      tags: [DevPortal]
      summary: 列出組織下的 Applications
      x-test-role: admin
      x-test-setup:
        - operation: post-/api/organizations
          body: { name: "DevPortal List Org", managerUserId: "$.adminUserId" }
          extract:
            orgId: "$.data.id"
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
        '400':
          description: 請求錯誤
        '401':
          description: 未授權
        '422':
          description: 驗證失敗

  /api/dev-portal/apps/{appId}/keys:
    post:
      tags: [DevPortal]
      summary: 透過 Application 配發 App API Key
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                scope:
                  type: string
                boundModules:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 建立成功
        '400':
          description: 請求錯誤
        '401':
          description: 未授權
    get:
      tags: [DevPortal]
      summary: 列出組織下 App API Keys（經 Application 授權）
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '401':
          description: 未授權

  /api/dev-portal/apps/{appId}/keys/{keyId}/revoke:
    post:
      tags: [DevPortal]
      summary: 撤銷 App API Key（經 Application 授權）
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '400':
          description: 請求錯誤
        '401':
          description: 未授權
        '404':
          description: 找不到資源

  /api/dev-portal/apps/{appId}/webhook:
    put:
      tags: [DevPortal]
      summary: 設定 Application Webhook 與事件訂閱
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [webhookUrl, eventTypes]
              properties:
                webhookUrl:
                  type: string
                eventTypes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 成功
        '400':
          description: 請求錯誤
        '401':
          description: 未授權

  /api/dev-portal/docs:
    get:
      tags: [DevPortal]
      summary: Developer Portal API 文件摘要
      responses:
        '200':
          description: 成功

  /api/organizations/{orgId}/dashboard:
    get:
      tags: [Dashboard]
      summary: Dashboard 摘要
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{orgId}/dashboard/usage:
    get:
      tags: [Dashboard]
      summary: 使用量統計
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{orgId}/credits/balance:
    get:
      tags: [Credit]
      summary: 查詢組織點數餘額
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{orgId}/credits/transactions:
    get:
      tags: [Credit]
      summary: 查詢點數交易紀錄
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功

  /api/organizations/{orgId}/credits/topup:
    post:
      tags: [Credit]
      summary: 組織點數儲值
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopupRequest'
      responses:
        '201':
          description: 儲值成功
        '422':
          description: 驗證失敗

  /api/organizations/{orgId}/credits/refund:
    post:
      tags: [Credit]
      summary: 組織點數退款
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: 退款成功
        '422':
          description: 驗證失敗

  # === Contract 合約管理 ===
  /api/contracts/handle-expiry:
    post:
      tags: [Contract]
      summary: 執行合約到期檢查（即將到期事件、已過期標記）
      x-test-role: admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 處理完成

  /api/contracts:
    post:
      tags: [Contract]
      summary: 建立合約
      x-test-role: admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
