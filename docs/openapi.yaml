  # === AppModule 模組管理 ===
  /api/modules:
    post:
      tags: [AppModule]
      summary: 註冊模組（admin）
      x-test-role: admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [free, paid]
      responses:
        '201':
          description: 模組註冊成功
        '422':
          description: 驗證失敗
    get:
      tags: [AppModule]
