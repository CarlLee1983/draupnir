        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [moduleId]
              properties:
                moduleId:
                  type: string
      responses:
        '201':
          description: 訂閱成功
        '422':
          description: 驗證失敗

  /api/organizations/{orgId}/modules/{moduleId}:
    delete:
      tags: [AppModule]
      summary: 取消訂閱模組
      x-test-role: admin
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 取消訂閱成功

  /api/organizations/{orgId}/modules:
    get:
      tags: [AppModule]
      summary: 列出組織已訂閱模組
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 訂閱列表

  /sdk/v1/chat/completions:
    post:
      tags: [SdkApi]
      summary: App API Key 代理 chat completions（OpenAI 相容，轉發 Bifrost）
      security:
        - appApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: OpenAI chat completions 相容本文（model、messages 等）
      responses:
        '200':
          description: Bifrost 成功回應本文
        '400':
          description: 缺少 model/messages 等
        '401':
          description: 缺少或無效的 App API Key
        '403':
          description: scope 或綁定模組不足
        '502':
          description: Bifrost 回傳錯誤

  /sdk/v1/usage:
    get:
      tags: [SdkApi]
      summary: 查詢目前 App Key 對應 Virtual Key 的用量統計
      security:
        - appApiKeyAuth: []
      parameters:
        - name: start_date
          in: query
          required: false
          schema:
            type: string
        - name: end_date
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 用量統計
        '401':
          description: 缺少或無效的 App API Key
        '500':
          description: 查詢失敗

  /sdk/v1/balance:
    get:
      tags: [SdkApi]
      summary: 查詢 App Key 所屬組織的 Credit 餘額
      security:
        - appApiKeyAuth: []
      responses:
        '200':
          description: 餘額與狀態
        '401':
          description: 缺少或無效的 App API Key
        '500':
          description: 查詢失敗

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    appApiKeyAuth:
      type: http
      scheme: bearer
      description: App API Key（Bearer drp_app_…）

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        confirmPassword:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        phone:
          type: string
        bio:
          type: string

    CreateOrgRequest:
      type: object
      required: [name, managerUserId]
      properties:
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        managerUserId:
          type: string
          format: uuid

    ChangeStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, inactive, suspended]

    ChangeOrgStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, suspended]

    InvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ChangeMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string

    CreateApiKeyRequest:
      type: object
      required: [label]
      properties:
        label:
          type: string
        permissions:
          type: array
          items:
            type: string

    UpdateKeyLabelRequest:
      type: object
      required: [label]
      properties:
        label:
          type: string

    SetKeyPermissionsRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string

    IssueAppApiKeyRequest:
      type: object
      required: [label]
      properties:
        label:
          type: string
        scope:
          type: string
          enum: [read, write, admin]
        rotationPolicy:
          type: object
          properties:
            autoRotate:
              type: boolean
            rotationIntervalDays:
              type: integer
            gracePeriodHours:
              type: integer
        boundModuleIds:
          type: array
          items:
            type: string
        expiresAt:
          type: string

    SetAppApiKeyScopeRequest:
      type: object
      properties:
        scope:
          type: string
          enum: [read, write, admin]
        boundModuleIds:
          type: array
          items:
            type: string

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
              format: email
            role:
              type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                email:
                  type: string
            accessToken:
              type: string
            refreshToken:
              type: string

    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string

    TopupRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: string
        description:
          type: string

    RefundRequest:
      type: object
      required: [amount, referenceType, referenceId]
      properties:
        amount:
          type: string
        referenceType:
          type: string
        referenceId:
          type: string
        description:
          type: string

    ContractTerms:
      type: object
      required: [creditQuota, allowedModules, rateLimit, validityPeriod]
      properties:
        creditQuota:
          type: number
        allowedModules:
          type: array
          items:
            type: string
        rateLimit:
          type: object
          properties:
            rpm:
              type: number
            tpm:
              type: number
        validityPeriod:
          type: object
          required: [startDate, endDate]
          properties:
            startDate:
              type: string
              format: date-time
            endDate:
              type: string
              format: date-time

    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        timestamp:
          type: string
        checks:
          type: object
          additionalProperties: true
        message:
          type: string

x-test-flows:
  auth-flow:
    description: 完整認證流程
    steps:
      - operation: post-/api/auth/register
        body:
          email: "flow-auth@feature.test"
          password: "SecurePass123"
        expect:
          status: 201
        extract:
          userId: "$.data.id"

      - operation: post-/api/auth/login
        body:
          email: "flow-auth@feature.test"
          password: "SecurePass123"
        expect:
          status: 200
          body:
            data.accessToken: { exists: true }
            data.refreshToken: { exists: true }
        extract:
          token: "$.data.accessToken"
          refreshToken: "$.data.refreshToken"

      - operation: get-/api/users/me
        auth: "$.token"
        expect:
          status: 200

      - operation: post-/api/auth/refresh
        body:
          refreshToken: "$.refreshToken"
        expect:
          status: 200
          body:
            data.accessToken: { exists: true }
        extract:
          newToken: "$.data.accessToken"

      - operation: post-/api/auth/logout
        auth: "$.token"
        expect:
          status: 200

  org-flow:
    description: 組織建立與列表（需要 admin 權限）
    setup: admin
    steps:
      - operation: post-/api/organizations
        auth: "$.adminToken"
        body:
          name: "Test Organization"
          managerUserId: "$.adminUserId"
        expect:
          status: 201

      - operation: get-/api/organizations
        auth: "$.adminToken"
        expect:
          status: 200
