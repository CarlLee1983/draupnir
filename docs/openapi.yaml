        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      x-test-setup:
        - operation: post-/api/modules
          auth: admin
          body:
            name: "test-module-setup"
            type: "free"
          extract:
            moduleId: "$.data.id"
      responses:
        '200':
          description: 模組詳情

  /api/organizations/{orgId}/modules/subscribe:
    post:
      tags: [AppModule]
      summary: 訂閱模組
      x-test-role: admin
