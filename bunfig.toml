[test]
# Phase 20: generate coverage text table on `bun test`. Exit code is driven by test pass/fail only; aggregate threshold 0.8 was causing exit 1 on otherwise green runs (Bun 1.3+).
coverage = true
# Optional gate for CI: raise when the suite consistently clears (e.g. 0.75 → 0.8).
coverageThreshold = 0.0
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
