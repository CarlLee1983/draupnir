<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Profile Updated</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #f4f4f4; padding: 10px; text-align: center; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Profile Updated</h1>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>This is to inform you that your profile information has been updated.</p>
            <p><strong>Updated fields:</strong> {{ fields }}</p>
            <p>If you did not perform this change, please contact support immediately.</p>
        </div>
        <div class="footer">
            <p>&copy; {{ year }} Draupnir Platform</p>
        </div>
    </div>
</body>
</html>
